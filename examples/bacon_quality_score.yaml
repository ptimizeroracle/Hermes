# Bacon Description Quality Scorer
# Part 2 of composition: Rate the quality of cleaned descriptions

dataset:
  source_type: dataframe  # Injected by composer
  input_columns:
    - Item_Description_Long  # Original (for comparison)
    - cleaned_description    # From previous pipeline!
  output_columns:
    - quality_score

prompt:
  response_format: raw
  template: |
    Rate the quality of this cleaned product description (0-100%).
    
    **Original**: {Item_Description_Long}
    **Cleaned**: {cleaned_description}
    
    Evaluate based on:
    1. **Clarity** - Is it easy to understand? (30%)
    2. **Completeness** - Are key attributes included? (30%)
    3. **Professionalism** - Free of codes, brands, jargon? (20%)
    4. **Accuracy** - Does it preserve key info from original? (20%)
    
    Score Guidelines:
    - 90-100%: Excellent - Professional, complete, clear
    - 70-89%: Good - Minor improvements possible
    - 50-69%: Fair - Missing some attributes or unclear
    - Below 50%: Poor - Major issues or incomplete
    
    Return ONLY the quality percentage (e.g., "95%" or "72%").

  system_message: |
    You are a quality assurance specialist for foodservice product data.
    You evaluate how well product descriptions meet professional standards.
    Be objective and consistent in your scoring.
    Return only the percentage - no explanations.

llm:
  provider: groq
  model: llama-3.3-70b-versatile
  temperature: 0.0
  max_tokens: 10
  input_cost_per_1k_tokens: 0.00005
  output_cost_per_1k_tokens: 0.00008

processing:
  batch_size: 100
  concurrency: 5
  max_retries: 2
  retry_delay: 1.0
  error_policy: skip

