# Example: Multi-Column Composition Configuration
# This demonstrates how to process multiple independent columns

composition:
  input: "ground_truth.xlsx"

  pipelines:
    # Column 1: Similarity score (independent)
    - column: llm_similarity
      config: examples/bacon_similarity_only.yaml

    # Column 2: Explanation (depends on similarity)
    - column: Explanation
      depends_on: [llm_similarity]
      config: examples/bacon_explanation.yaml

    # Column 3: Confidence score (depends on both)
    - column: confidence_score
      depends_on: [llm_similarity, Explanation]
      config: examples/bacon_confidence.yaml

# How it works:
# 1. Loads ground_truth.xlsx
# 2. Runs bacon_similarity_only.yaml → generates llm_similarity column
# 3. Runs bacon_explanation.yaml → uses llm_similarity to generate Explanation
# 4. Runs bacon_confidence.yaml → uses both to generate confidence_score
# 5. Final output has all 3 columns

# Usage:
#   from src.api import PipelineComposer
#   composer = PipelineComposer.from_yaml("examples/composition_example.yaml")
#   result = composer.execute()
