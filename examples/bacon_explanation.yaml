# Bacon Explanation Generator (Depends on Similarity)
# Used as part of composition pipeline

dataset:
  source_type: dataframe  # Will be injected by composer
  input_columns:
    - incumbent
    - portfolio
    - llm_similarity  # Uses output from previous pipeline!
  output_columns:
    - Explanation

prompt:
  response_format: raw
  template: |
    Given that these two bacon products have a similarity score of {llm_similarity}%, 
    provide a detailed technical explanation for this score.
    
    Incumbent: {incumbent}
    Portfolio: {portfolio}
    
    Explain the score based on:
    - Slice count per pound (thickness)
    - Form factor (layflat, shingled, etc.)
    - Preparation state (raw vs. cooked)
    - Handling requirements (frozen vs. refrigerated)
    - Portioning consistency
    
    Return 2-3 sentences explaining the key factors driving the similarity score.

llm:
  provider: groq
  model: llama-3.3-70b-versatile
  temperature: 0.3  # Slightly creative for explanations
  max_tokens: 200
  input_cost_per_1k_tokens: 0.00005
  output_cost_per_1k_tokens: 0.00008

processing:
  batch_size: 50
  concurrency: 3
  max_retries: 2
  error_policy: skip

