# Similarity Explanation Generator
# Part 2: Detailed technical justification (uses similarity score)

dataset:
  source_type: dataframe  # Injected by composer
  input_columns:
    - incumbent
    - portfolio
    - llm_similarity  # From previous pipeline!
  output_columns:
    - Explanation

prompt:
  response_format: raw
  template: |
    You rated these bacon products as {llm_similarity}% similar.
    
    Provide a detailed technical explanation for this score.
    
    Incumbent: {incumbent}
    Portfolio: {portfolio}
    
    Explain based on Sodexo's 5-Pillar Framework:
    1. Functional Equivalence - Recipe/workflow compatibility
    2. Sensory & Quality Parity - Taste, texture, appearance
    3. Compliance & Safety - Nutritional, legal, ethical
    4. Operational Viability - Storage, prep, service workflows
    5. Commercial Sustainability - Scalability, cost, availability
    
    Focus on the KEY FACTORS that drove the {llm_similarity}% score.
    Return 2-3 concise sentences.

  system_message: |
    You are a Senior Culinary Technologist at Sodexo.
    Provide clear, actionable technical explanations.
    Reference the similarity percentage explicitly.
    Be professional and concise.

llm:
  provider: groq
  model: llama-3.3-70b-versatile
  temperature: 0.2  # Slightly creative for natural explanations
  max_tokens: 200
  input_cost_per_1k_tokens: 0.00005
  output_cost_per_1k_tokens: 0.00008

processing:
  batch_size: 50
  concurrency: 3
  max_retries: 2
  error_policy: skip

