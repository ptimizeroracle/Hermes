# Bacon Similarity Analysis with Independent Column Prompts
# Uses PipelineComposer to generate 3 columns, each with optimized prompt

composition:
  input: "ground_truth_clean_columns.xlsx"
  
  pipelines:
    # Pipeline 1: Similarity Score (independent, fast)
    - column: llm_similarity
      config: examples/similarity_score_only.yaml
    
    # Pipeline 2: Detailed Explanation (depends on similarity)
    - column: Explanation
      depends_on: [llm_similarity]
      config: examples/similarity_explanation.yaml
    
    # Pipeline 3: Risk Assessment (depends on both)
    - column: swap_risk_score
      depends_on: [llm_similarity, Explanation]
      config: examples/swap_risk_assessment.yaml

# Usage:
#   from src.api import PipelineComposer
#   composer = PipelineComposer.from_yaml("examples/similarity_independent_columns.yaml")
#   result = composer.execute()

# Result:
#   - llm_similarity: Generated from optimized scoring prompt
#   - Explanation: Generated from explanation prompt (uses similarity score as context)
#   - swap_risk_score: Generated from risk assessment prompt (uses both previous outputs)

# Cost comparison vs JSON mode:
#   JSON (1 prompt):  3600 rows × 1 call = 3600 calls
#   Independent (3 prompts): 3600×1 + 3600×1 + 3600×1 = 10,800 calls (3x cost)
#   
# But benefits:
#   - Each prompt optimized for its specific task
#   - Explanation can reference the exact similarity percentage
#   - Risk assessment considers both similarity AND explanation quality
#   - Better accuracy/reliability per column

