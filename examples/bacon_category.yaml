# Bacon Category Tagger
# Part 3 of composition: Categorize bacon type from cleaned description

dataset:
  source_type: dataframe  # Injected by composer
  input_columns:
    - cleaned_description  # From first pipeline
  output_columns:
    - category

prompt:
  response_format: raw
  template: |
    Categorize this bacon product into ONE of these categories:
    
    Product: {cleaned_description}
    
    Categories:
    - SLICED_RAW: Raw sliced bacon (any thickness)
    - SLICED_COOKED: Pre-cooked sliced bacon
    - BITS_PIECES: Bacon bits, crumbles, or pieces
    - SLAB: Slab bacon (unsliced)
    - SPECIALTY: Canadian bacon, turkey bacon, or specialty products
    
    Return ONLY the category name (e.g., "SLICED_RAW" or "BITS_PIECES").

  system_message: |
    You are a product taxonomy specialist for foodservice.
    Categorize products accurately based on form factor and preparation state.
    Return only the category code - no explanations.

llm:
  provider: groq
  model: llama-3.3-70b-versatile
  temperature: 0.0
  max_tokens: 20
  input_cost_per_1k_tokens: 0.00005
  output_cost_per_1k_tokens: 0.00008

processing:
  batch_size: 100
  concurrency: 5
  max_retries: 2
  retry_delay: 1.0
  error_policy: skip

